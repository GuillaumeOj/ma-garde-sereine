# Local development stack. Production runs on Vercel (function + Neon), not here.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nounou
      POSTGRES_PASSWORD: nounou
      POSTGRES_DB: nounou
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nounou"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: "1"
      SECRET_KEY: "dev-only-secret-change-me"
      DATABASE_URL: "postgres://nounou:nounou@db:5432/nounou"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - ./backend:/app
      # Preserve the container's Linux virtualenv (don't let the host .venv shadow it).
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
