[tox]
env_list = py313, lint, type
requires =
    tox>=4.56
    tox-uv>=1.35

# All environments are built by tox-uv from uv.lock, so they match the pinned
# dependency set exactly (see pyproject.toml + uv.lock).

[testenv]
description = Run the test suite with pytest
runner = uv-venv-lock-runner
dependency_groups = dev
set_env =
    # Point at the Dockerized Postgres by default; override to test elsewhere.
    DATABASE_URL = {env:DATABASE_URL:postgres://nounou:nounou@localhost:5432/nounou}
commands =
    pytest {posargs}

[testenv:lint]
description = Lint with ruff
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check {posargs:.}

[testenv:type]
description = Type-check the whole backend with ty (blocking)
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ty check {posargs}

[testenv:dev]
description = Start the local dev stack — Postgres in Docker + Django dev server (hot reload)
runner = uv-venv-lock-runner
dependency_groups = dev
allowlist_externals =
    docker
# tox does not merge set_env from [testenv], so DATABASE_URL is repeated here to
# keep it overridable (otherwise dev would silently fall back to the settings default).
set_env =
    DATABASE_URL = {env:DATABASE_URL:postgres://nounou:nounou@localhost:5432/nounou}
    DEBUG = {env:DEBUG:1}
    DJANGO_ALLOWED_HOSTS = {env:DJANGO_ALLOWED_HOSTS:localhost,127.0.0.1}
# Bring up (only) the database container and wait until it is healthy.
commands_pre =
    docker compose -f {tox_root}/../docker-compose.yml up -d --wait db
commands =
    python manage.py migrate
    python manage.py runserver {posargs:0.0.0.0:8000}
